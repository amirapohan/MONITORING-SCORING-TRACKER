name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Cache Docker layers
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Docker images
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: user/app:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }} # IP Address Server kamu
          username: ${{ secrets.SERVER_USER }} # username misal: ubuntu atau root
          key: ${{ secrets.SERVER_SSH_KEY }} # Private SSH key milik servermu
          script: |
            cd /home/user/backend-project
            # Tarik kode terbaru
            git pull origin main

            # Build ulang dan jalankan container tanpa interupsi (-d)
            docker-compose up -d --build
