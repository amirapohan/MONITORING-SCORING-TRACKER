services:
  backend:
    build: ./backend
    ports:
      # 8084 = port host kelompok (audit/kel-4); 8080 = port container (disepakati semua tim)
      - "8084:8080"
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=db # Gunakan nama service 'db', bukan 'localhost'
      - DB_PORT=5432 # Gunakan port internal container, bukan 5433
      - DB_USER=kel4
      - DB_PASSWORD=kel4
      - DB_NAME=kel4
      - DATABASE_URL=postgresql://kel4:kel4@db:5432/kel4
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-kel4}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kel4}
      POSTGRES_DB: ${DB_NAME:-kel4}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kel4 -d kel4"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
