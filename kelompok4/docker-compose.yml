services:
  backend:
    build: ./backend
    ports:
      # 8084 = port host kelompok (audit/kel-4); 8080 = port container (disepakati semua tim)
      - "8084:8080"
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=db # Gunakan nama service 'db', bukan 'localhost'
      - DB_PORT=5432 # Gunakan port internal container, bukan 5433
      - DB_USER=kel4
      - DB_PASSWORD=kel4
      - DB_NAME=kel4
      - DATABASE_URL=postgresql://kel4:kel4@db:5432/kel4
      - REDIS_URL=redis://redis:6379
      # Storage media via MinIO. Backend konek internal ke service "minio".
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-kel4minio}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-kel4miniosecret}
      - MINIO_BUCKET=${MINIO_BUCKET:-documents}
      # URL yang dipakai service lain di tailnet untuk mengunduh file.
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://minio-kel4.ts.net:9000}
    depends_on:
      - db
      - redis
      - minio
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-kel4}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kel4}
      POSTGRES_DB: ${DB_NAME:-kel4}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kel4 -d kel4"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped

  # Object storage untuk file media (S3-compatible).
  # TIDAK ada "ports:" -> tidak diekspos ke publik. Hanya dijangkau:
  #  - service lain di compose ini via nama "minio"
  #  - host lain di tailnet via sidecar tailscale (mode serve)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-kel4minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-kel4miniosecret}
    volumes:
      - minio_data:/data # <-- persistensi file media di sini
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sidecar Tailscale: mem-proxy MinIO ke tailnet pakai `tailscale serve`
  # (privat untuk anggota tailnet, BUKAN `funnel` yang publik).
  # Sidecar ada di docker network yang sama -> bisa resolve "minio".
  tailscale-minio:
    image: tailscale/tailscale:latest
    hostname: minio-kel4 # -> MagicDNS: minio-kel4.<tailnet>.ts.net
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?set TS_AUTHKEY di .env}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: --advertise-tags=tag:minio
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    cap_add:
      - net_admin
    restart: unless-stopped
    depends_on:
      - minio

volumes:
  postgres_data:
  minio_data:
  tailscale_state:
