<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Certificate</title>
    <style>
      @page {
        size: 16in 9in;
        margin: 0;
      }

      body {
        margin: 0;
        width: 100%;
        min-height: 100vh;
        font-family: "DejaVu Sans", sans-serif;
        background: #f4f2eb;
        color: #1f2937;
      }

      .canvas {
        box-sizing: border-box;
        width: 100%;
        min-height: 100vh;
        padding: 72px;
        border: 18px solid #102a43;
        background:
          radial-gradient(circle at top right, rgba(16, 42, 67, 0.08), transparent 32%),
          linear-gradient(135deg, #f9fafb 0%, #f4f2eb 100%);
      }

      .eyebrow {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #486581;
      }

      .title {
        margin: 20px 0 16px;
        font-size: 58px;
        line-height: 1.05;
        color: #102a43;
      }

      .description {
        margin: 0;
        font-size: 24px;
        line-height: 1.7;
        max-width: 980px;
      }

      .talent {
        margin: 44px 0 14px;
        font-size: 56px;
        line-height: 1.08;
        color: #1d4ed8;
      }

      .project {
        margin: 0;
        font-size: 32px;
        line-height: 1.4;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: 84px;
      }

      .signature {
        border-top: 2px solid #102a43;
        padding-top: 14px;
        min-width: 320px;
        font-size: 18px;
      }

      .meta {
        text-align: right;
        font-size: 18px;
        color: #486581;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <p class="eyebrow">Certificate of Project Completion</p>
      <h1 class="title">This certificate is awarded to</h1>
      <h2 class="talent">{{talentName}}</h2>
      <p class="description">For successfully completing the freelance project</p>
      <p class="project"><strong>{{projectTitle}}</strong></p>
      <section class="footer">
        <div class="signature">{{issuerName}}</div>
        <div class="meta">
          <div>Completed on {{completedAt}}</div>
          <div>Generated by Kelompok 4 Tracker</div>
        </div>
      </section>
    </main>
  </body>
</html>
