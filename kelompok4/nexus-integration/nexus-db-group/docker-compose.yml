# ============================================================
#  NEXUS — DB GROUP  (project: nexus-db-group)
#  One PostgreSQL per service. Start this SECOND (after infra).
#  Host ports: auth 5431, bidding 5432, match 5433, audit 5434,
#  notify 5435. Internal DNS = service name on nexus-shared-net.
# ============================================================
name: nexus-db-group

services:

  db-auth:
    image: postgres:15-alpine
    container_name: DB-auth
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-auth}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
    ports: ["5431:5432"]
    volumes: ["auth_data:/var/lib/postgresql/data"]
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-bidding:
    image: postgres:15-alpine
    container_name: DB-bidding
    environment:
      POSTGRES_USER: ${BIDDING_DB_USER:-bidding}
      POSTGRES_PASSWORD: ${BIDDING_DB_PASS:-bidding}
      POSTGRES_DB: ${BIDDING_DB_NAME:-bidding}
    ports: ["5432:5432"]
    volumes:
      - bidding_data:/var/lib/postgresql/data
      - ../../../kelompok2-project-bidding-service/database_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BIDDING_DB_USER:-bidding}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-match:
    image: postgres:15-alpine
    container_name: DB-match
    environment:
      POSTGRES_USER: ${MATCH_DB_USER:-match}
      POSTGRES_PASSWORD: ${MATCH_DB_PASS:-match}
      POSTGRES_DB: ${MATCH_DB_NAME:-match}
    ports: ["5433:5432"]
    volumes:
      - match_data:/var/lib/postgresql/data
      - ../../../kelompok3-team-matching-service/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MATCH_DB_USER:-match}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-audit:
    image: postgres:15-alpine
    container_name: DB-audit
    environment:
      POSTGRES_USER: ${AUDIT_DB_USER:-kel4}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASS:-kel4}
      POSTGRES_DB: ${AUDIT_DB_NAME:-kel4}
    ports: ["5436:5432"]
    volumes: ["audit_data:/var/lib/postgresql/data"]
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUDIT_DB_USER:-kel4}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Notification (group 5) has no DB in code; this container exists
  # only to mirror the requested 5-DB structure (host port 5435).
  db-notify:
    image: postgres:15-alpine
    container_name: DB-notify
    environment:
      POSTGRES_USER: ${NOTIFY_DB_USER:-notify}
      POSTGRES_PASSWORD: ${NOTIFY_DB_PASS:-notify}
      POSTGRES_DB: ${NOTIFY_DB_NAME:-notify}
    ports: ["5435:5432"]
    volumes: ["notify_data:/var/lib/postgresql/data"]
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFY_DB_USER:-notify}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  nexus-net:
    external: true
    name: nexus-shared-net

volumes:
  auth_data:
  bidding_data:
  match_data:
  audit_data:
  notify_data:
