# ============================================================
#  NEXUS API Gateway (nginx)
#  Single entry point -> routes to each microservice by name.
#  Containers listen internally on port 8080.
#
#  Uses Docker's embedded DNS (127.0.0.11) + variable upstreams so
#  nginx re-resolves service IPs at request time. Without this, nginx
#  caches upstream IPs at startup and `docker compose up` recreating a
#  service silently breaks routing.
# ============================================================

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /healthz {
        return 200 'gateway ok\n';
        add_header Content-Type text/plain;
    }

    # ---- AUTH / IDENTITY & SSO ----
    location = /auth/health {
        set $svc_auth svc-auth;
        rewrite ^ /health break;
        proxy_pass http://$svc_auth:8080;
    }

    location /auth/ {
        set $svc_auth svc-auth;
        rewrite ^/auth/(.*)$ /api/auth/$1 break;
        proxy_pass http://$svc_auth:8080;
    }

    # ---- BIDDING ----
    location = /bidding/health {
        set $svc_bidding svc-bidding;
        rewrite ^ /health break;
        proxy_pass http://$svc_bidding:8080;
    }

    location /bidding/ {
        set $svc_bidding svc-bidding;
        rewrite ^/bidding/(.*)$ /api/$1 break;
        proxy_pass http://$svc_bidding:8080;
    }

    # ---- MATCH / TEAM-MATCHING ----
    location /match/ {
        set $svc_match svc-match;
        rewrite ^/match/(.*)$ /$1 break;
        proxy_pass http://$svc_match:8080;
    }

    # ---- AUDIT / MONITORING-SCORING-TRACKER ----
    location = /tracker/health {
        set $svc_audit svc-audit;
        rewrite ^ /api/v1/health break;
        proxy_pass http://$svc_audit:8080;
    }

    location /tracker/ {
        set $svc_audit svc-audit;
        rewrite ^/tracker/(.*)$ /api/v1/$1 break;
        proxy_pass http://$svc_audit:8080;
    }

    # ---- NOTIFY / NOTIFICATION ----
    location = /notify/health {
        set $svc_notify svc-notify;
        rewrite ^ /health break;
        proxy_pass http://$svc_notify:8080;
    }

    location /notify/ {
        set $svc_notify svc-notify;
        rewrite ^/notify/(.*)$ /api/$1 break;
        proxy_pass http://$svc_notify:8080;
    }

    location / {
        return 200 'NEXUS Gateway up. Routes: /auth /bidding /match /tracker /notify\n';
        add_header Content-Type text/plain;
    }
}
