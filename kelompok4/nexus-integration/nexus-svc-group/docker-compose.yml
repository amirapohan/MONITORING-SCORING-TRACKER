# ============================================================
#  NEXUS — SERVICE GROUP  (project: nexus-svc-group)
#  5 microservices (built from source) + API gateway.
#  Start this LAST (after infra-group and db-group are healthy).
#
#  Cross-project depends_on is not possible, so ordering is
#  handled by ../up.sh and each service's restart policy.
#  DB/broker hostnames resolve via the shared external network.
# ============================================================
name: nexus-svc-group

services:

  # ---------- API GATEWAY ----------
  gateway:
    image: nginx:alpine
    container_name: nexus-gateway
    ports:
      - "80:80"
    volumes:
      - ../gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - svc-auth
      - svc-bidding
      - svc-match
      - svc-audit
      - svc-notify
    networks: [nexus-net]
    restart: unless-stopped

  # ---------- SERVICE: AUTH / IDENTITY & SSO (group 1) ----------
  svc-auth:
    build:
      context: ../../../kelompok1-identity-and-sso-service
      target: dev
    container_name: SVC-auth
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://${AUTH_DB_USER:-auth}:${AUTH_DB_PASS:-auth}@db-auth:5432/${AUTH_DB_NAME:-auth}?schema=public
      DIRECT_URL: postgresql://${AUTH_DB_USER:-auth}:${AUTH_DB_PASS:-auth}@db-auth:5432/${AUTH_DB_NAME:-auth}?schema=public
      JWT_SECRET: ${JWT_SECRET:-nexus-shared-jwt-secret}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
      REDIS_URL: redis://redis-main:6379
    command: ["sh", "-c", "npx prisma migrate deploy && npx prisma generate && npm run dev"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [nexus-net]
    restart: unless-stopped

  # ---------- SERVICE: BIDDING (group 2) ----------
  svc-bidding:
    build:
      context: ../../../kelompok2-project-bidding-service
      target: development
    container_name: SVC-bidding
    ports:
      - "8082:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://${BIDDING_DB_USER:-bidding}:${BIDDING_DB_PASS:-bidding}@db-bidding:5432/${BIDDING_DB_NAME:-bidding}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [nexus-net]
    restart: unless-stopped

  # ---------- SERVICE: MATCH / TEAM-MATCHING (group 3) ----------
  svc-match:
    build:
      context: ../../../kelompok3-team-matching-service
    container_name: SVC-match
    ports:
      - "8083:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_HOST: db-match
      DATABASE_PORT: 5432
      DATABASE_USER: ${MATCH_DB_USER:-match}
      DATABASE_PASSWORD: ${MATCH_DB_PASS:-match}
      DATABASE_NAME: ${MATCH_DB_NAME:-match}
      MOCK_SSO_URL: http://svc-auth:8080
      INTERNAL_SERVICE_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks: [nexus-net]
    restart: unless-stopped

  # ---------- SERVICE: AUDIT / MONITORING-SCORING-TRACKER (group 4) ----------
  svc-audit:
    build:
      context: ../../backend
      dockerfile: dockerfile
    container_name: SVC-audit
    ports:
      - "8084:8080"
    env_file:
      - ../.env
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${AUDIT_DB_USER:-kel4}:${AUDIT_DB_PASS:-kel4}@db-audit:5432/${AUDIT_DB_NAME:-kel4}
      REDIS_URL: redis://redis-main:6379
      RABBITMQ_URL: amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbit-main:5672
      RABBITMQ_EXCHANGE: tracker.events
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_ROUTING_PREFIX: tracker
      AUTH_INTERNAL_URL: http://svc-auth:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-documents}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [nexus-net]
    restart: unless-stopped

  # ---------- SERVICE: NOTIFY / NOTIFICATION (group 5) ----------
  svc-notify:
    build:
      context: ../../../kelompok5-notification-service
    container_name: SVC-notify
    ports:
      - "8085:8080"
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      PORT: 8080
      RABBITMQ_URL: amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbit-main:5672
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [nexus-net]
    restart: unless-stopped

networks:
  nexus-net:
    external: true
    name: nexus-shared-net
