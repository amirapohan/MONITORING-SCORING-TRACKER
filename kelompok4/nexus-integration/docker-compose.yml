# ============================================================
#  NEXUS — Master Integration Compose (BUILD FROM SOURCE)
#  5 microservices + shared infra (RabbitMQ, Redis) + API Gateway.
#
#  Layout (sibling folders under /APL):
#    nexus-integration/ ........ this file (inside the tracker repo)
#    ../../kelompok1-identity-and-sso-service   (svc-auth, branch develop)
#    ../../kelompok2-project-bidding-service    (svc-bidding, branch main)
#    ../../kelompok3-team-matching-service      (svc-match, branch develop)
#    ../backend                                 (svc-audit, this repo)
#    ../../kelompok5-notification-service       (svc-notify, branch main)
#
#  Every service listens on internal port 8080 (PORT env), so the
#  gateway (gateway.conf) routes uniformly to svc-*:8080.
#
#  Usage:
#    cp .env.example .env   # fill SUPABASE_* (and GMAIL_* if you want real email)
#    docker compose up -d --build
#    open http://localhost      (gateway)   |  http://localhost:15672 (RabbitMQ)
# ============================================================

services:
  # ---------- API GATEWAY ----------
  gateway:
    image: nginx:alpine
    container_name: nexus-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - svc-auth
      - svc-bidding
      - svc-match
      - svc-audit
      - svc-notify
    networks: [nexus-net]
    restart: unless-stopped

  # ---------- SHARED INFRA ----------
  rabbit-main:
    image: rabbitmq:3-management
    container_name: nexus-rabbit-main
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:-guest}
    networks: [nexus-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-main:
    image: redis:7-alpine
    container_name: nexus-redis-main
    ports:
      - "6379:6379"
    networks: [nexus-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- SERVICE: AUTH / IDENTITY & SSO (group 1) ----------
  svc-auth:
    build:
      context: ../../kelompok1-identity-and-sso-service
      target: dev
    container_name: SVC-auth
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://${AUTH_DB_USER:-auth}:${AUTH_DB_PASS:-auth}@db-auth:5432/${AUTH_DB_NAME:-auth}?schema=public
      DIRECT_URL: postgresql://${AUTH_DB_USER:-auth}:${AUTH_DB_PASS:-auth}@db-auth:5432/${AUTH_DB_NAME:-auth}?schema=public
      JWT_SECRET: ${JWT_SECRET:-nexus-shared-jwt-secret}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
      REDIS_URL: redis://redis-main:6379
      RABBITMQ_URL: amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@100.104.36.45:5672
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    # dev target CMD does not migrate; apply migrations before starting.
    command:
      [
        "sh",
        "-c",
        "npx prisma migrate deploy && npx prisma generate && npm run dev",
      ]
    depends_on:
      db-auth: { condition: service_healthy }
      redis-main: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [nexus-net]
    restart: unless-stopped

  db-auth:
    image: postgres:15-alpine
    container_name: DB-auth
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-auth}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
    ports: ["5431:5432"]
    volumes: ["auth_data:/var/lib/postgresql/data"]
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- SERVICE: BIDDING (group 2) ----------
  svc-bidding:
    build:
      context: ../../kelompok2-project-bidding-service
      target: development
    container_name: SVC-bidding
    ports:
      - "8082:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://${BIDDING_DB_USER:-bidding}:${BIDDING_DB_PASS:-bidding}@db-bidding:5432/${BIDDING_DB_NAME:-bidding}
      AUTH_INTERNAL_URL: http://svc-auth:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
      RABBITMQ_URL: amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@100.104.36.45:5672
      RABBITMQ_EXCHANGE: tracker.events
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_ROUTING_PREFIX: bidding
    depends_on:
      db-bidding: { condition: service_healthy }
      rabbit-main: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [nexus-net]
    restart: unless-stopped

  db-bidding:
    image: postgres:15-alpine
    container_name: DB-bidding
    environment:
      POSTGRES_USER: ${BIDDING_DB_USER:-bidding}
      POSTGRES_PASSWORD: ${BIDDING_DB_PASS:-bidding}
      POSTGRES_DB: ${BIDDING_DB_NAME:-bidding}
    ports: ["5435:5432"]
    volumes:
      - bidding_data:/var/lib/postgresql/data
      - ../../kelompok2-project-bidding-service/database_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BIDDING_DB_USER:-bidding}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- SERVICE: MATCH / TEAM-MATCHING (group 3) ----------
  svc-match:
    build:
      context: ../../kelompok3-team-matching-service
    container_name: SVC-match
    ports:
      - "8083:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_HOST: db-match
      DATABASE_PORT: 5432
      DATABASE_USER: ${MATCH_DB_USER:-match}
      DATABASE_PASSWORD: ${MATCH_DB_PASS:-match}
      DATABASE_NAME: ${MATCH_DB_NAME:-match}
      MOCK_SSO_URL: http://svc-auth:8080
      INTERNAL_SERVICE_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
    depends_on:
      db-match: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks: [nexus-net]
    restart: unless-stopped

  db-match:
    image: postgres:15-alpine
    container_name: DB-match
    environment:
      POSTGRES_USER: ${MATCH_DB_USER:-match}
      POSTGRES_PASSWORD: ${MATCH_DB_PASS:-match}
      POSTGRES_DB: ${MATCH_DB_NAME:-match}
    ports: ["5433:5432"]
    volumes:
      - match_data:/var/lib/postgresql/data
      - ../../kelompok3-team-matching-service/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MATCH_DB_USER:-match}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- SERVICE: AUDIT / MONITORING-SCORING-TRACKER (group 4) ----------
  svc-audit:
    build:
      context: ../backend
      dockerfile: dockerfile
    container_name: SVC-audit
    ports:
      - "8084:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${AUDIT_DB_USER:-kel4}:${AUDIT_DB_PASS:-kel4}@db-audit:5432/${AUDIT_DB_NAME:-kel4}
      REDIS_URL: redis://redis-main:6379
      RABBITMQ_URL: amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@100.104.36.45:5672
      RABBITMQ_EXCHANGE: tracker.events
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_ROUTING_PREFIX: tracker
      AUTH_INTERNAL_URL: http://svc-auth:8080
      BIDDING_INTERNAL_URL: http://svc-bidding:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-nexus-internal-api-key}
      # Validasi integrasi lintas-service (K4->K1/K2). Default OFF.
      VALIDATE_INTEGRATION: ${VALIDATE_INTEGRATION:-false}

    depends_on:
      db-audit: { condition: service_healthy }
      redis-main: { condition: service_healthy }
      rabbit-main: { condition: service_healthy }
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [nexus-net]
    restart: unless-stopped

  db-audit:
    image: postgres:15-alpine
    container_name: DB-audit
    environment:
      POSTGRES_USER: ${AUDIT_DB_USER:-kel4}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASS:-kel4}
      POSTGRES_DB: ${AUDIT_DB_NAME:-kel4}
    ports: ["5434:5432"]
    volumes: ["audit_data:/var/lib/postgresql/data"]
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUDIT_DB_USER:-kel4}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- SERVICE: NOTIFY / NOTIFICATION (group 5) ----------
  svc-notify:
    build:
      context: ../../kelompok5-notification-service
    container_name: SVC-notify
    ports:
      - "8085:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      RABBITMQ_URL: amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@100.104.36.45:5672
      RABBITMQ_EXCHANGE: tracker.events
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_QUEUE: notify.events
      RABBITMQ_BINDINGS: tracker.#,bidding.#
      # Leave GMAIL_* empty for log-only mode (no real email, no secrets).
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_PASS: ${GMAIL_PASS:-}
    depends_on:
      rabbit-main: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [nexus-net]
    restart: unless-stopped

networks:
  nexus-net:
    driver: bridge

volumes:
  auth_data:
  bidding_data:
  match_data:
  audit_data:
