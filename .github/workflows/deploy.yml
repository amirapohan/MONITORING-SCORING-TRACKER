name: Build & Deploy Nexus Services

# Trigger:
# - Push ke main/integration → otomatis build & deploy service yang berubah
# - workflow_dispatch → jalan manual (bisa pilih service apa yang dideploy)
on:
  push:
    branches: [main, integration]
    paths:
      - "kelompok1-identity-and-sso-service/**"
      - "kelompok2-project-bidding-service/**"
      - "kelompok3-team-matching-service/**"
      - "kelompok4/backend/**"
      - "kelompok4/nexus-integration/gateway.conf"
      - "kelompok4/nexus-integration/gateway.Dockerfile"
      - "kelompok4/nexus-integration/docker-compose.deploy.yml"
      - "kelompok5-notification-service/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build & deploy semua service (abaikan path filter)"
        type: boolean
        default: false

env:
  DOCKERHUB_NAMESPACE: scientivan
  IMAGE_TAG: latest

jobs:
  # ----------------------------------------------------------------
  # 1. Deteksi service mana yang berubah
  # ----------------------------------------------------------------
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      bidding: ${{ steps.filter.outputs.bidding }}
      match: ${{ steps.filter.outputs.match }}
      audit: ${{ steps.filter.outputs.audit }}
      notify: ${{ steps.filter.outputs.notify }}
      gateway: ${{ steps.filter.outputs.gateway }}
      force_all: ${{ github.event.inputs.force_all || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'kelompok1-identity-and-sso-service/**'
            bidding:
              - 'kelompok2-project-bidding-service/**'
            match:
              - 'kelompok3-team-matching-service/**'
            audit:
              - 'kelompok4/backend/**'
            notify:
              - 'kelompok5-notification-service/**'
            gateway:
              - 'kelompok4/nexus-integration/gateway.conf'
              - 'kelompok4/nexus-integration/gateway.Dockerfile'

  # ----------------------------------------------------------------
  # 2. Build & push tiap service yang berubah → Docker Hub
  #    Pakai matrix; tiap entry punya context, dockerfile, target.
  # ----------------------------------------------------------------
  build:
    name: Build ${{ matrix.svc.name }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc:
          - { name: auth,    image: nexus-svc-auth,    context: kelompok1-identity-and-sso-service, dockerfile: Dockerfile,                target: dev,         changed_key: auth }
          - { name: bidding, image: nexus-svc-bidding, context: kelompok2-project-bidding-service,  dockerfile: Dockerfile,                target: development, changed_key: bidding }
          - { name: match,   image: nexus-svc-match,   context: kelompok3-team-matching-service,    dockerfile: Dockerfile,                target: "",          changed_key: match }
          - { name: audit,   image: nexus-svc-audit,   context: kelompok4/backend,                  dockerfile: dockerfile,                target: "",          changed_key: audit }
          - { name: notify,  image: nexus-svc-notify,  context: kelompok5-notification-service,     dockerfile: Dockerfile,                target: "",          changed_key: notify }
          - { name: gateway, image: nexus-gateway,     context: kelompok4/nexus-integration,        dockerfile: gateway.Dockerfile,        target: "",          changed_key: gateway }
    steps:
      - name: Skip if service not changed
        id: gate
        run: |
          force_all='${{ needs.detect.outputs.force_all }}'
          changed='${{ needs.detect.outputs[matrix.svc.changed_key] }}'
          if [ "$force_all" = "true" ] || [ "$changed" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Service ${{ matrix.svc.name }} tidak berubah — skip"
          fi

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.gate.outputs.run == 'true'
        name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: steps.gate.outputs.run == 'true'
        name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.svc.context }}
          file: ${{ matrix.svc.context }}/${{ matrix.svc.dockerfile }}
          target: ${{ matrix.svc.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.svc.image }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.svc.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.svc.name }}
          cache-to: type=gha,scope=${{ matrix.svc.name }},mode=max

  # ----------------------------------------------------------------
  # 3. Deploy ke PC dosen via SSH (Tailscale supaya tembus NAT/firewall)
  #    Hanya jalan kalau minimal 1 build sukses.
  # ----------------------------------------------------------------
  deploy:
    name: Deploy ke PC dosen
    needs: [detect, build]
    runs-on: ubuntu-latest
    if: success() && (needs.detect.outputs.force_all == 'true' || needs.detect.outputs.auth == 'true' || needs.detect.outputs.bidding == 'true' || needs.detect.outputs.match == 'true' || needs.detect.outputs.audit == 'true' || needs.detect.outputs.notify == 'true' || needs.detect.outputs.gateway == 'true')
    steps:
      - uses: actions/checkout@v4

      # Tailscale supaya runner GitHub bisa nyambung ke PC dosen yang
      # tidak punya IP publik. Set di Tailscale admin → OAuth client +
      # ACL tag:ci. Skip step ini kalau PC dosen sudah punya IP publik
      # dan kamu mau pakai SSH langsung.
      - name: Connect to Tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Salin compose deploy + .env ke PC dosen, lalu pull image baru
      # dan restart service yang berubah saja (no-deps biar DB/Rabbit
      # tidak ikut restart). force_all = restart semuanya.
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "kelompok4/nexus-integration/docker-compose.deploy.yml"
          target: "~/nexus/"
          strip_components: 2

      - name: Pull & restart changed services
        uses: appleboy/ssh-action@v1.2.0
        env:
          FORCE_ALL: ${{ needs.detect.outputs.force_all }}
          CH_AUTH: ${{ needs.detect.outputs.auth }}
          CH_BIDDING: ${{ needs.detect.outputs.bidding }}
          CH_MATCH: ${{ needs.detect.outputs.match }}
          CH_AUDIT: ${{ needs.detect.outputs.audit }}
          CH_NOTIFY: ${{ needs.detect.outputs.notify }}
          CH_GATEWAY: ${{ needs.detect.outputs.gateway }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: FORCE_ALL,CH_AUTH,CH_BIDDING,CH_MATCH,CH_AUDIT,CH_NOTIFY,CH_GATEWAY
          script: |
            set -e
            cd ~/nexus
            # File .env wajib sudah disiapkan manual di server.
            test -f .env || { echo "ERROR: ~/nexus/.env belum ada di PC dosen"; exit 1; }

            services=""
            if [ "$FORCE_ALL" = "true" ]; then
              services="svc-auth svc-bidding svc-match svc-audit svc-notify gateway"
            else
              [ "$CH_AUTH"    = "true" ] && services="$services svc-auth"
              [ "$CH_BIDDING" = "true" ] && services="$services svc-bidding"
              [ "$CH_MATCH"   = "true" ] && services="$services svc-match"
              [ "$CH_AUDIT"   = "true" ] && services="$services svc-audit"
              [ "$CH_NOTIFY"  = "true" ] && services="$services svc-notify"
              [ "$CH_GATEWAY" = "true" ] && services="$services gateway"
            fi
            services=$(echo "$services" | xargs)
            echo "Deploying: $services"

            docker compose -f docker-compose.deploy.yml pull $services
            docker compose -f docker-compose.deploy.yml up -d --no-deps $services
            docker image prune -f
            docker compose -f docker-compose.deploy.yml ps
